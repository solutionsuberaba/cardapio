<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solutions QR | Acesso Restrito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e272e; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 35px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .btn-login { background: #2f3542; color: white; border-radius: 50px; padding: 12px; font-weight: bold; transition: 0.3s; border: none; }
        .btn-login:hover { background: #ff4757; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 class="fw-bold mb-4">SOLUTIONS <span class="text-danger">QR</span></h2>
        <p class="text-muted small">Acesso restrito à equipe autorizada</p>
        <div class="mb-3 text-start">
            <label class="small fw-bold ms-2">Login</label>
            <input type="text" id="l-user" class="form-control rounded-pill px-3" placeholder="Digite seu usuário">
        </div>
        <div class="mb-4 text-start">
            <label class="small fw-bold ms-2">Senha</label>
            <input type="password" id="l-pass" class="form-control rounded-pill px-3" placeholder="••••••••">
        </div>
        <button class="btn-login w-100" onclick="tentarLogin()">ENTRAR NO PAINEL</button>
    </div>

    <script>
        async function tentarLogin() {
            const login = document.getElementById('l-user').value;
            const senha = document.getElementById('l-pass').value;
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ login, senha })
            });

            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('nomeG', data.user.nome);
                localStorage.setItem('nivel', data.user.nivel);
                
                // Redirecionamento Inteligente
                if(data.user.nivel === 'ADMIN') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'garcom.html';
                }
            } else {
                alert("Credenciais Inválidas! Verifique seu login e senha.");
            }
        }
    </script>
</body>
</html>
